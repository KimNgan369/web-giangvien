<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For education</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/signup.css">
</head>
<body>
    <div class="container">
        <div class="signup-container">
            <img src="../img/logoF.png" alt="For education Logo" class="F-logo">
            <div class="accent-bar"></div>
            
            <h1>Sign up</h1>
            
            <div class="role-selector btn-group">
                <button class="btn btn-outline-primary active-role" id="role-learner">Learner</button>
                <button class="btn btn-outline-primary" id="role-teacher">Teacher</button>
            </div>
            
            <form id="signup-form">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email">
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Create a password">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">What is your date of birth?</label>
                    <div class="date-selectors">
                        <select class="form-select" id="month">
                            <option selected disabled>Month</option>
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4">April</option>
                            <option value="5">May</option>
                            <option value="6">June</option>
                            <option value="7">July</option>
                            <option value="8">August</option>
                            <option value="9">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                        
                        <select class="form-select" id="year">
                            <option selected disabled>Year</option>
                            <!-- JavaScript will populate years -->
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="btn-continue">Sign up</button>
                
                <div class="form-actions">
                    <a href="#" class="link-primary">Enter class code</a>
                    <a href="#" class="link-primary">Already have an account?</a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="../js/signup.js"></script>
</body>
</html>
