<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khan Academy Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="../css/login.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 col-xl-4">
                <div class="login-container p-4 p-md-5">
                    <h1 class="text-center mb-4">Log in</h1>
                    
                    <!-- Social Login Buttons -->
                    <div class="social-login mb-4">
                        <button class="btn btn-outline-secondary w-100 mb-3 d-flex align-items-center justify-content-center">
                            <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google logo" class="social-icon me-2" width="20" height="20">
                            Continue with Google
                        </button>
                        
                        <button class="btn btn-outline-secondary w-100 mb-3 d-flex align-items-center justify-content-center">
                            <span class="social-icon me-2 d-flex align-items-center justify-content-center text-primary" style="width: 20px; height: 20px; font-weight: bold;">C</span>
                            Continue with Clever
                        </button>
                        
                        <button class="btn btn-outline-secondary w-100 mb-3 d-flex align-items-center justify-content-center">
                            <i class="bi bi-facebook social-icon me-2 text-primary" style="font-size: 20px;"></i>
                            Continue with Facebook
                        </button>
                        
                        <button class="btn btn-outline-secondary w-100 mb-3 d-flex align-items-center justify-content-center">
                            <i class="bi bi-apple social-icon me-2" style="font-size: 20px;"></i>
                            Continue with Apple
                        </button>
                    </div>
                    
                    <!-- Email Login Form -->
                    <form>
                        <p class="small text-muted mb-3">* indicates a required field.</p>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">Email or username <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="email" required>
                        </div>
                        
                        <div class="mb-2">
                            <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="password" required>
                        </div>
                        
                        <div class="mb-4">
                            <a href="#" class="link-primary small">Forgot password?</a>
                        </div>
                        
                        <div class="mb-4">
                            <button type="submit" class="btn btn-secondary w-100 py-2">Log in</button>
                        </div>
                    </form>
                    
                    <div class="text-center">
                        <p class="mb-0">Need a Khan Academy account? <a href="#" class="link-primary">Create an account</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>


    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
